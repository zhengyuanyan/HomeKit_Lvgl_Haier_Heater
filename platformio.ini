; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; 默认编译哪块板子
default_envs = esp32s3_dial

[common]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
framework = arduino
board = esp32-s3-devkitc-1
monitor_speed = 115200
upload_speed = 921600
upload_protocol = esptool
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
; upload_protocol = espota
; upload_port = 192.168.50.183
; upload_flags =
;     --port=3232

lib_deps =
    SPI
    Wire
    lvgl@9.3
    bodmer/TFT_eSPI@^2.5.43
    bogde/HX711 @ 0.7.5
    lewisxhe/SensorLib@^0.4.0
    homespan/HomeSpan@^2.1.6
    adafruit/Adafruit NeoPixel@^1.15.2

build_flags =
    -Wcpp
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=4
    -D LV_CONF_SKIP
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_COLOR_DEPTH=16
    -D LV_MEM_SIZE="(128U * 1024U)"
    -D USER_SETUP_LOADED=1
    -D LV_USE_TFT_ESPI=1
    -D USE_HSPI_PORT
    -D GC9A01_DRIVER=1
    -D TFT_HEIGHT=240
    -D TFT_HOR_RES=240
    -D TFT_VER_RES=240

    -D enc_input_debug=1
    -D enc_button_input_debug=1
    -D input_task_debug=1
    -D lv_hal_debug=1

[env:esp32s3_dial]
extends = common
board_build.flash_mode = qio
board_upload.flash_size = 8MB
board_build.partitions = min_spiffs.csv

build_flags =
    ${common.build_flags}
    -D esp32s3_dial=1
    -D encoder_button_enter_Pin=GPIO_NUM_42
    -D I2C_SDA_Pin=GPIO_NUM_11
    -D I2C_SCL_Pin=GPIO_NUM_12
    -D I2C_CLOCK_Speed=400000
    -D EC35_A_Pin=GPIO_NUM_41
    -D EC35_B_Pin=GPIO_NUM_40
    -D TFT_DC=4
    -D TFT_MISO=-1
    -D TFT_MOSI=5
    -D TFT_SCLK=6
    -D TFT_CS=7
    -D TFT_RST=8
    -D TFT_BL=9
    -D TFT_BACKLIGHT_ON=HIGH
    -D SPI_FREQUENCY=40000000

# --- 86型中控盒配置 ---
[env:esp32s3_86_box]
extends = common
board_build.flash_mode = qio
board_upload.flash_size = 16MB
# 强制指定 16MB 对应的最大尺寸
board_upload.maximum_size = 16777216
board_build.partitions = min_spiffs.csv

build_flags =
    ${common.build_flags}
    -D esp32s3_86_box=1
    -D hx711_input_debug=1

    -D HX711_DO_Pin=12 
    -D HX711_SCK_Pin=13
    -D EC35_A_Pin=GPIO_NUM_46
    -D EC35_B_Pin=GPIO_NUM_45
    -D I2C_SDA_Pin=47
    -D I2C_SCL_Pin=48
    -D I2C_CLOCK_Speed=400000
    -D TFT_DC=38
    -D TFT_MISO=-1
    -D TFT_MOSI=42
    -D TFT_SCLK=41
    -D TFT_CS=39
    -D TFT_RST=40
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D SPI_FREQUENCY=40000000